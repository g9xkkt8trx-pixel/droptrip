<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f7669" />
    <title>DROPTRIP | オフライン</title>
    <style>
      :root { color: #294a43; background: #f2f4f3; font-family: Inter, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif; }
      body { min-width: 320px; min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
      main { width: min(100%, 430px); padding: 28px; box-sizing: border-box; background: #fff; border: 1px solid #dbe7e3; border-radius: 18px; box-shadow: 0 20px 60px rgba(34, 76, 67, .14); }
      h1 { margin: 0 0 12px; font-size: 1.35rem; }
      p { margin: 0; line-height: 1.8; }
      p + p { margin-top: 12px; color: #65746f; font-size: .9rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>現在オフラインです</h1>
      <p>通信環境を確認して再度お試しください。</p>
      <p>AI旅行プランの生成と移動時間の取得には通信が必要です。</p>
    </main>
  </body>
</html>
